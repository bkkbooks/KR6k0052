body:
  text: 結界法第一注曰其諸結界羯磨作法一與上大僧同唯稱𡰱大姊為異受戒法第二比丘𡰱乞畜衆羯磨注曰若比丘𡰱欲度人者當往比丘𡰱僧中偏露右肩脫革屣禮僧足已右膝著地合掌乞畜衆羯磨作如是白大姊僧聽我比丘𡰱某甲今從僧乞度人授具足戒願僧聽我度人授人授具足戒注曰如是三説與畜衆羯磨文大德僧聽此比丘𡰱某甲今從僧乞度人授人具足戒若僧時到僧忍聽僧今聽比丘𡰱某甲度人授人具足戒白如是大姊僧聽此比丘𡰱某甲今從僧乞度人授人具足戒僧今聽比丘𡰱某甲度人授人具足戒誰諸大姊忍僧聽比丘𡰱某甲度人授人具足戒者默然誰不忍者説僧已忍聽比丘𡰱某甲度人授人具足戒竟僧忍默然故是事如是持度沙𡰱文注曰若在寺內剃髮者應白一切僧若不和合應房房語令知若和合應作白然後與剃髮應作如是言大姊僧聽此某甲欲從某甲求剃髮若僧時到僧忍聽為某甲剃髮白如是注曰白已為剃髮欲在寺內出家者應白一切僧若不和合應房房令知若和合應作白然後與出家應作如是白大姊僧聽此某甲欲從某甲求出家若僧時到僧忍聽與某甲出家白如是注曰應作如是出家教出家者著袈裟已偏露右肩脫革屣右膝著地合掌教作如是言我阿姨某甲歸依佛歸依法歸依僧我今隨佛出家和上𡰱某甲如來無所著等正覺是我世尊注曰如是三説我阿姨某甲歸依佛竟歸依法竟歸依僧竟我今隨佛出家竟和上𡰱某甲如來無所著等正覺是我世尊注曰如是三説説如是已應與受戒盡形壽不得煞生是沙戒能持不注曰答言能盡形壽不得偷盜是沙𡰱戒能持不注曰答言能盡形壽不得淫欲是沙𡰱戒能持不注曰答言能盡形壽不得妄語是沙𡰱戒能持不注曰答言能盡形壽不得飲酒是沙𡰱戒能持不注曰答言能盡形壽不得著華香塗身是沙𡰱戒能持不注曰答言能盡形壽不得歌儛唱伎及往觀聽比丘𡰱羯磨經第一石背是沙𡰱戒能持不注曰答言能盡形壽不得高廣大牀上坐是沙𡰱戒能持不注曰答言能盡形壽不得非時食是沙𡰱戒能持不注曰答言能盡形壽不得捉持生像金銀寶物是沙𡰱戒能持不注曰答言能如是沙𡰱十戒盡形壽不得犯能持不注曰答言能汝已受戒竟當供養三寶佛寶法寶僧寶當修三業坐禪誦經勸助衆事注曰聽童女十八者二年學戒年滿二十二部僧中受大戒若年十曾出適者聽二年學戒年滿十二與受大戒應如是與二學戒式叉摩那受六法文注曰沙應往比丘𡰱衆中偏露右肩脫革屣禮比丘𡰱僧足已右膝著地合掌白如是言大姊僧聽我沙𡰱某甲今從僧乞二學戒和上𡰱某甲願僧濟度我慈愍故與我二學戒注曰如是三説應將沙𡰱至離聞處著見處衆中應著堪能作羯磨者如上應作白言大姊僧聽此某甲沙𡰱今從僧乞二學戒和上𡰱某甲若僧時到僧忍聽僧今與某甲沙𡰱二學戒和上𡰱某甲白如是大姊僧聽此某甲沙𡰱今從僧乞二學戒和上𡰱某甲僧今與某甲沙𡰱二學戒和上𡰱某甲誰諸大姊忍僧與某甲沙𡰱二學戒和上𡰱某甲者默然誰不忍者説是初羯磨注曰如是三説僧已忍與某甲沙𡰱二學戒和上𡰱某甲竟僧忍默然故是事如是持注曰應如是與六法某甲諦聽如來無所著等正覺説六法不得犯不淨行行淫欲法若式叉摩那行淫欲法非式叉摩那非釋種女與染汙心男子共身相摩觸缺戒應更與受戒是中盡形壽不得犯能持不注曰答言能不得偷盜乃至草葉若式叉摩那取人五錢若過五錢若自取教人取若自斫教人斫若自破教人破若燒若埋若壞色非式叉摩那非釋種女若取減五錢缺戒應更與受戒是中盡形壽不得犯能持不注曰答言能不得故斷衆生命乃至蟻子若式叉摩那故自手斷人命求刀授與人教死勸死讚死與人非藥墮胎厭禱呪術自作教人作者非式叉摩那非釋種女若斷畜生不能變化者命缺戒應更與受戒是中盡形壽不得犯能持不注曰答言能不得妄語乃至戲𭉋若式叉摩那不真實非己有自稱言得上人法言得禪得解脫得三昧正受得須陀洹果斯陀含果阿那含果阿羅漢果言天來龍來鬼神來供養我此非式叉摩那非釋種女若於衆中故作妄語缺應更與受戒是中盡形壽不得犯能持不注曰答言能不得非時食若式叉摩那非時食犯戒應更與受戒是中盡形壽不得犯能持不注曰答言能不得飲酒若式叉摩那飲酒犯戒應更與受戒是中盡形壽不得犯能持不注曰答言能式叉摩那於一切𡰱戒中應學除為比丘𡰱過食自受食食式叉摩那受大戒法注曰若式叉摩那學戒已年滿草若滿十二應與受大戒先至比丘𡰱僧中請和上應如是説言大姊一心念我某甲求阿姨為和上願阿姨為我作和上我依阿姨故得受大戒注曰如是三説和上𡰱應答言尓注曰應如是受戒人離聞處著見處應差教授師是戒師應如是問言此衆中誰能為某甲作教授師注曰若有者答言我能尓時戒師即應作白大姊僧聽此某甲從和上𡰱某甲求受大戒若僧時到僧忍聽某甲為教授師白如是注曰教授師應往至受戒人所語言此安陀會鬱多羅僧僧伽梨此僧竭䨱肩衣此衣鉢是汝有不注曰答言有善女人諦聽今是真誠時我今問汝有便言有無當言無汝不犯邊罪不汝不犯淨行比丘不汝不賊心受戒不汝不破內外道不汝非黃門不汝不煞父不汝不煞母不汝不煞真人阿羅漢不汝不破僧不汝不𢙣心出佛身血不汝非非人不汝非畜生不汝非二根不汝字何等和上𡰱字誰年滿未衣鉢具足不父母夫主聽汝不汝不負債不汝非婢不汝是女人不女人有如是諸病癩白癩𤴲消顛狂二根二道合道小大小便常漏涕唾常出汝有如是諸病不注曰答言無應語言如我向問汝僧中亦當如是問汝如向者答我僧中亦當如是答注曰教授師問已應至僧中如常威儀至舒手及處立應作白比丘𡰱羯磨經第二石面大姊僧聽此某甲從和上𡰱某甲求受大戒若僧時到僧忍聽我已教授竟聽使來白如是注曰彼應語言來來已應與捉衣鉢教禮僧足已在戒師前互跪合掌教作如是言大姊僧聽我某甲從和上𡰱某甲求受大戒我某甲今從僧乞受大戒和上𡰱某甲願僧濟度我慈愍故注曰第二第三亦如是説是中戒師應作白大姊僧聽此某甲從和上𡰱某甲求受大戒此某甲今從僧乞受大戒和上𡰱某甲若僧時到僧忍聽我問諸難事白如是汝諦聽今是真誠時我今問汝有當言有無當言無汝不犯邊罪不汝不犯淨行比丘不汝不賊心受戒不汝不破內外道不汝非黃門不汝不煞父不汝不煞母不汝不煞真人阿羅漢不汝不破僧不汝不𢙣心出佛身血不汝非非人不汝非畜生不汝不二根不汝字何等和上𡰱字誰年滿未衣鉢具足不父母夫主聽汝不汝不負債不汝非婢不汝是女人不女人有如是諸病癩白癩𤴲消顛狂二根二道合道小大小便常漏涕唾常出汝有如是諸病不注曰答言無應作白大姊僧聽此某甲從和上𡰱某甲求受大戒此某甲今從僧乞受大戒和上𡰱某甲某甲自説清淨無諸難事年滿草衣鉢具足若僧時到僧忍聽僧今為某甲受大戒和上𡰱某甲如是白大姊僧聽此某甲從和上𡰱某甲求受大戒此某甲今從僧乞受大戒和上𡰱某甲某甲自説清淨無諸難事年已滿衣鉢具足僧今為某甲受大戒和上𡰱某甲誰諸大姊忍僧今為某甲受大戒和上𡰱某甲者默然誰不忍者説是初羯磨注曰如是三説僧已忍與某甲受大戒竟和上𡰱某甲僧忍默然故是事如是持𡰱往比丘僧中受大戒法注曰汝受戒者與比丘𡰱俱至比丘僧中禮僧足已右膝著地合掌作如是言大德僧聽我某甲從和上𡰱某甲求受大戒我某甲今從僧乞受大戒和上𡰱某甲願僧救濟慈愍故注曰如是三説此中戒師應問諸難事大德僧聽此某甲從和上𡰱某甲求受大戒此某甲今從僧乞受大戒和上𡰱某甲若僧時到僧忍聽我問諸難事白如是善女人諦聽今是真誠時實語時我今問汝有當言有無當言無汝不犯邊罪不汝不犯淨行比丘不汝不賊心受戒不汝不破內外道不汝非黃門不汝不煞父不汝不煞母不汝不煞真人阿羅漢不汝不破僧不汝不𢙣心出佛身血不汝非非人不汝非畜生不汝非二根不汝字何等和上𡰱字誰年滿草未衣鉢具足不父母夫主聽不汝不負債不汝非婢不汝是女人不女人有如是諸病癩白癩𤴲消痼顛狂二根二道合道小大小便常漏涕唾常出汝有如是諸病不注曰答言無應問言汝學戒未清淨不注曰答言學戒清淨應問餘比丘𡰱某甲學戒未清淨不注曰答言已學戒清淨大德僧聽此某甲從和上𡰱某甲求受大戒此某甲今從僧乞受大戒和上𡰱某甲某甲自説清淨無諸難事年已滿衣鉢具足已學戒清淨若僧時到僧忍聽僧今為某甲受大戒和上𡰱某甲白如是大德僧聽此某甲從和上𡰱某甲求受大戒此某甲今從僧乞受大戒和上𡰱某甲某甲自説清淨戒無諸難事年已滿衣鉢具足已學戒清淨僧今為某甲受大戒和上𡰱某甲誰諸長老忍僧為某甲受大戒和上𡰱某甲者默然誰不忍者説是初羯磨注曰第二第三亦如是説僧已忍為某甲受大戒竟和上𡰱某甲僧忍默然故是事如是持善女人諦聽如來無所著等正覺説八波羅夷法若比丘𡰱犯者非比丘𡰱非釋種女不得犯不淨行行淫欲法若比丘𡰱作不淨行行淫欲法乃至共畜生此非比丘𡰱非釋種女是中盡形壽不得犯能持不注曰答言能不得偷盜乃至草葉若比丘𡰱盜人五錢若過五錢若自取教人取若自斫教人斫若自破教人破若燒若埋若壞色非比丘𡰱非釋種女是中盡形壽不得犯能持不注曰答言能不得斷衆生命乃至蟻子若比丘𡰱自手斷人命持刀授與人教死讚死勸死與人非藥墮胎厭禱呪術若作方便教人作方便非比丘𡰱非釋種女是中盡形壽不得犯能持不注曰答言能不得妄語乃至戲笑若比丘𡰱不真實非已有自稱言得上人法得禪得解脫三昧正受得須陀洹果斯陀含果阿那含果阿羅漢果言天來龍來鬼神來供養我彼非比丘𡰱非釋種女是中盡形壽不得犯能持不注曰答言能不得身相觸乃至共畜生若比丘𡰱有染汙心與染汙心男子身相觸掖已下膝已上若摩若捺若逆摩若順摩若牽若推若舉若下若捉若急𭡠彼非比丘𡰱非釋種女是中盡形壽不得犯能持不注曰答言能不得犯八事乃至共畜生若比丘𡰱有染汙心與染汙心男子受捉手捉衣至屏處屏處立屏處語若共行若身相近若共期行犯此八事彼非比丘𡰱非釋種女是中盡形壽不得犯能不注曰答言能不得䨱藏他重罪乃至突吉羅𢙣説若比丘𡰱知比丘𡰱犯波羅夷不自舉亦不白僧不語人令知後於異時此比丘𡰱若𠇾道若滅儐若作不共住若入外道後作如是言我先知此人如是如是彼非比丘𡰱非釋種女䨱藏他重罪是中盡形壽不得犯能持不注曰答言能不得隨被舉比丘語乃至沙若比丘𡰱知比丘為僧所舉如法如毗𡰱如佛所教犯威儀未懺悔不作共住便隨順彼比丘彼比丘𡰱諫此比丘𡰱言大姊彼比丘為僧所舉如法毗𡰱如佛所教犯威儀未懺悔不作共住莫隨順彼比丘彼比丘𡰱諫此比丘𡰱時堅持不捨彼比丘𡰱應乃至三諫捨此事故乃至三諫捨者善若不捨者彼非比丘𡰱非釋種女犯隨舉是中盡形壽不得犯能持不注曰答言能善女人諦聽如來無所著等正覺説四依法比丘𡰱依此出家受大戒是比丘𡰱法依糞掃衣出家受大戒是比丘𡰱法是中盡形壽不得犯能持不注曰答言能若得長利若檀越施衣若得輕衣若得割截衣應受依乞食出家受大戒是比丘𡰱法是中盡形壽能持不注曰答言能若得長利僧差食若檀越送食月八日食十五日食月初日食衆僧常食檀越請食得受依樹下坐出家受大戒是比丘𡰱法是中盡形壽能持不注曰答言能若得長利若別房樓閣小房石室兩房一戶應受依腐爤藥出家受大戒是比丘𡰱法是中盡形壽能持不注曰答言能若得長利蘇油生蘇蜜石蜜應受汝已受戒竟白四羯磨如法成就得處所和上如法阿闍梨如法二部僧具足滿當善受教法當勤供養佛法僧阿闍梨和上一切如法教勑不得違逆當學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始出家功不唐捐果報不絶餘所未知者當問和上阿闍梨去注曰使受戒人在前而去除罪法第三𡰱懺僧殘罪法注曰𡰱以女弱事須相假以蘭其懷如若私己容𢙣則自壞壞彼犯在不輕故𡰱䨱僧殘但增罪治半月行摩那埵無別䨱藏調伏法故𡰱懺僧殘要在二部僧中作摩那埵羯磨大僧與𡰱二部各滿四人若作出罪羯磨大僧與𡰱部各滿草人不得減乞摩那埵羯磨文注曰比丘𡰱犯僧殘罪應二部僧中半月行摩那埵時應至僧中偏露右肩脫革屣禮僧足右膝著地合掌作言大德僧聽我比丘𡰱某甲犯某甲若干僧殘罪今從二部僧乞半月摩那埵願僧與我半月摩那埵慈愍故注曰如是三説與摩那埵羯磨文大德僧聽此比丘𡰱某甲犯某甲若干僧殘罪今從二部僧乞半月摩那埵若僧時到僧忍聽僧今與比丘𡰱某甲半月摩那埵白如是大德僧聽此比丘𡰱某甲犯某甲若干僧殘罪今從二部僧乞半月摩那埵僧今與比丘𡰱某甲半月摩那埵誰諸長老忍僧與比丘𡰱某甲半月摩那埵者默然誰不忍者説是初羯磨注曰如是三説僧已忍與比丘𡰱某甲半月摩那埵竟僧忍默然故是事如是持注曰比丘𡰱行摩那埵法與上大僧同唯應二部僧中唱白應作如是言大德僧聽我比丘𡰱某甲犯某甲若干僧殘罪比丘𡰱羯磨經石第三末已從二部僧乞半月摩那埵僧已與我半月摩那埵我比丘𡰱某甲已行若干日過餘有若干日在白大德僧令知我行摩那埵乞出罪羯磨文注曰比丘𡰱半月行摩那埵竟應至二部僧中作如是乞大德僧聽我比丘𡰱某甲犯若干僧殘罪已從二部僧乞半月摩那埵僧已與我半月摩那埵已於二部僧中行半月摩那埵竟今從僧乞出罪羯磨願僧與我出罪羯磨慈愍故注曰如是三説與出罪羯磨文大德僧聽此比丘𡰱某甲若干僧殘罪已從二部僧乞半月摩那埵僧已與比丘𡰱某甲半月摩那埵此比丘𡰱某甲已於二部僧中行半月摩那埵竟今從僧乞出罪羯磨若僧時到僧忍聽僧今與比丘𡰱某甲出罪羯磨白如是大德僧聽此比丘𡰱某甲犯某甲若干僧殘罪已從二部僧乞半月摩那埵僧已與比丘𡰱某甲半月摩那埵此比丘𡰱某甲已於二部僧中行半月摩那埵竟今從僧乞出罪羯磨僧今與比丘𡰱某甲出罪羯磨誰諸長老忍僧今與比丘𡰱某甲出罪羯磨者默然誰不忍者説是初羯磨注曰如是三説僧已忍與比丘𡰱某甲出罪羯磨竟僧忍默然故是事如是持説戒法第四注曰其説戒法一與上大僧同𡰱僧差請教授人羯磨文注曰𡰱僧應半月半月至大僧中請教誡故今須差此使若𡰱僧請教誡應如是差大姊僧聽若僧時到僧忍聽僧今差比丘𡰱某甲為比丘𡰱僧故半月往比丘僧中求教授白如是大姊僧聽僧今差比丘𡰱某甲為比丘𡰱僧故半月往比丘僧中求教授誰諸大姊忍僧差比丘𡰱某甲為比丘𡰱僧故半月往比丘僧中求教授者默然誰不忍者説僧已忍差比丘𡰱某甲為比丘𡰱僧故半月往比丘僧中求教授竟僧忍默然故是事如是持注曰更差一人為伴往大僧中至舊住比丘所禮足曲身低頭合掌白如是言大德一心念比丘𡰱僧某甲等和合禮比丘僧足求教授注曰第二第三亦如是説受囑比丘説戒時應作如是白比丘𡰱僧某甲衆和合禮大德僧足求教授注曰如是三説比丘𡰱眀日應問可否比丘教授師應期往比丘𡰱應期迎比丘期往不往者突吉羅比丘𡰱期迎而不迎者突吉羅若比丘𡰱聞教授師來當半由旬迎至寺內供給所須洗浴具羹粥飲食果蓏以此供養若不者突吉羅若比丘僧盡病若衆不和合若衆不滿遣信往禮拜問訊若比丘𡰱僧盡病不和合若衆不滿亦當遣信往禮拜問訊若不往者突吉羅安居法第五注曰安居法皆與上大僧同自恣法第六毗𡰱僧差往大僧中受自恣人羯磨文注曰比丘𡰱僧夏安居竟應往大僧中受自恣故今須差此使為𡰱僧詣大僧中求受自恣應如是差大姊僧聽若僧時到僧忍聽僧今差比丘𡰱某甲為比丘𡰱僧故往大僧中説三事自恣見聞疑白如是大姊僧聽僧今差比丘𡰱某甲為比丘𡰱僧故往大僧中説三事自恣見聞疑誰諸大姊忍僧差比丘𡰱某甲為比丘𡰱僧故往大僧中説三事自恣見聞疑者默然誰不忍者説僧已忍差比丘𡰱某甲為比丘𡰱僧故往大僧中説三事自恣竟僧忍默然故是事如是持往大僧中受自恣文注曰差一人為伴往大僧中禮僧足已曲身低頭合掌作如是説比丘𡰱僧夏安居竟比丘僧夏安居竟比丘𡰱僧説三事自恣見聞疑大僧慈愍故語我我若見罪當如法懺悔注曰如是三説彼即比丘僧自恣日便自恣而皆疲極佛言不應爾若比丘僧十四日自恣比丘𡰱僧十五日自恣若大僧病若衆不和合若衆不滿比丘𡰱應遣信禮拜問訊不者突吉羅若比丘𡰱僧病若衆不和合若衆不滿比丘𡰱僧亦當遣信禮拜問訊不者突吉羅注曰其至大僧中受自恣人還共𡰱僧作自恣其自恣一與上大僧同分衣法第七注曰亦與上大僧同衣食淨法第八注曰𡰱無作餘食法除此已餘皆與上大僧同雜法第九注曰𡰱無乞分處作房法自餘皆與上大僧同內護匡救僧衆儐罰羯磨文律藏所眀僧之正法宗要有三故結集稱言是法是毗𡰱是佛所教法者謂五種遠離行何等五注曰一出離非世法二越度非受法三無欲非有欲四無結非有結五不親近生死親近毗𡰱者謂五種出要行何等五注曰一少欲非多欲二知足非無厭三易護非難護四易養非難養五智慧非愚癡佛所教者謂五種教戒行何等五注曰一有罪行者制二無罪者聽三若制若聽法有缺減者如法舉之四數數違犯者折伏與念五真實功德愛念稱嘆故經云正法住正法減謂之於此傳法之人亦有於三故聖誥稱言知法知律知摩夷知法者謂善持修多羅藏如阿難等知律者謂善持毗𡰱如優波離等知摩姨者謂善於訓導宰任玄綱如大迦葉等故凡欲暈蹤聖迹以隆道教繼䡄後代不絶於時者非茲而誰五種入衆法何等五注曰一應以慈心二應自卑下如拭塵巾三應善知坐起上下威儀四不雜説俗事為衆説法若請他説五若見僧中有不可事心不安忍應作默然五種如法默然何等五注曰一見他非法默然二不得伴而默然三犯重而默然四同住默然五在同住地默然五種非法默然何等五注曰如法羯磨而心不同默然住之二得同意佛而默然住之三若見小罪而默然四為作別住而默然五在戒場上而默然五種棄法何等五注曰一比丘犯罪餘比丘問汝犯罪見不答言不見彼語言汝若見罪應懺悔二比丘犯罪餘比丘問汝犯罪見不答言不見彼語言汝若見罪當於此僧中懺悔四比丘犯罪餘比丘問言汝犯罪見不答言不見衆僧應捨棄語言汝不見罪隨所至處不聽汝布薩如𢙣馬難調韁俱棄汝亦如是五比丘犯罪餘比丘問言汝犯罪見不答言不見彼應僧中作不見舉羯磨五種作羯磨法何等五注曰一現前二自言三清淨四如法五和合斯謂知對病知藥知對治善於廢興通塞存護之儀故致任持之功義顯於此三種調法注曰謂呵責羯磨儐羯磨依止羯磨三種調法注曰謂罪處所立人語如草䨱地三種不共住法注曰謂三舉羯磨𢙣馬治滅儐羯磨呵責羯磨注曰先作舉作憶念與罪已然後作羯磨大德僧聽此比丘某甲喜共𮤟諍共相罵詈口出刀劒互求長短彼自共𮤟諍已若復有餘比丘𮤟諍者即復往彼勸言汝等勉力莫不如他汝等多聞智慧財富亦勝多有知識我等當為汝作伴儻令僧未有諍事而有諍事已有諍事而不除滅若僧時到僧忍聽為比丘某甲作呵責羯磨若後復更𮤟諍共相罵詈者衆僧當更增罪治白如是大德僧聽此比丘某甲喜共𮤟諍共相罵詈口出刀劒互求長短彼此自共𮤟諍已若復有餘比丘𮤟諍者即復往彼勸言汝等勉力莫不如他汝等智慧多聞財富亦勝多有知識我等當為汝作伴儻令僧未有諍事而有諍事而不除滅僧為比丘某甲作呵責羯磨誰諸長老忍僧與比丘某甲作呵責羯磨若復後更鬪諍共相罵詈者衆僧當更增罪治忍者默然不者説是初羯磨注曰如是三説僧已忍為比丘某甲作呵責羯磨竟僧忍默然故是事如是持注曰與羯磨已以卅五事令其折伏後若其隨順改悔者僧應還與解脫羯磨與罪處所羯磨文注曰先作舉作憶念與罪已然後作羯磨大德僧聽是比丘某甲無慚無愧多犯諸罪有見聞疑先自言犯後言不犯前後言語相違若僧時到僧忍聽僧今與比丘某甲罪處所羯磨白如是大德僧聽是比丘某甲無慚無愧多犯諸罪有見聞疑先自言犯後言不犯前後言語相違僧今與是比丘某甲罪處所羯磨誰諸長老忍僧今與比丘某甲罪處所羯磨者默然誰不忍者説是初羯磨注曰第二第三亦如是説僧已忍與比丘某甲罪處所羯磨竟僧忍默然故是事如是持注曰與羯磨已以卅二事令其折伏後若其隨順改悔僧應還與解羯磨與滅儐羯磨注曰先作舉作憶念與罪已然後作羯磨大德僧聽是比丘某甲犯某甲波羅夷罪若僧時到僧忍聽僧今與比丘某甲波羅夷罪滅儐羯磨不得共住不得共事白如是大德僧聽是比丘某甲犯某甲波羅夷罪僧今與比丘某甲波羅夷罪滅儐羯磨不得共住不得共事誰諸長老忍僧與比丘某甲波羅夷罪滅儐羯磨不得共事者默然誰不忍者説是初羯磨注曰如是三説僧已忍與比丘某甲波羅夷罪滅擯羯磨不得共住不得共事竟僧忍默然故是事如是持注曰此永儐無解法此後三羯磨皆是治罰法但以過有輕重階之為三前呵責羯磨等是調伏法罪處所羯磨等是折伏法滅儐羯磨等是驅出法故經言應調伏者而調伏之應折伏者而折伏之應罰黜者而罰黜之若隨事而言羯磨非一備眀律典寧容具集故各當分唯㯹一羯磨記之恆式餘準以可知
